name: CI

on:
  push:
    branches: ["main", "master", "develop", "claude/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install "ruff>=0.4" "black>=24" isort

      - name: ruff (linting — erros reais E,F,W)
        run: ruff check src/ tests/

      - name: black (format check)
        run: black --check src/ tests/

      - name: isort (import order check)
        run: isort --check-only src/ tests/

  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install MCP dependencies
        # Tenta instalar fastmcp (preferido); fallback para mcp (SDK padrão)
        run: pip install "mcp>=1.0.0" requests httpx pydantic "pydantic-settings>=2.0.0" python-dotenv || true

      - name: Install fastmcp (opcional — não bloqueia se falhar)
        run: pip install "fastmcp>=2.0.0" || echo "fastmcp não disponível, usando mcp SDK"

      - name: Install dev dependencies
        run: pip install pytest pytest-asyncio

      - name: Run smoke tests
        env:
          WEBPOSTO_API_KEY: "dummy-key-for-tests"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short

  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax of all Python files
        # Usa compileall que propaga exit code corretamente (corrige bug apontado em review)
        run: python -m compileall src/ tests/ -q && echo "Todos os arquivos OK"
